# WWW Ingress
# Little-Link service running in public-sites namespace
# Handles both www.j-frost.dk and j-frost.dk

apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: www
  namespace: public-sites
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: websecure
    traefik.ingress.kubernetes.io/router.middlewares: default-security-headers@kubernetescrd
    cert-manager.io/cluster-issuer: letsencrypt-cloudflare
spec:
  ingressClassName: traefik
  tls:
  - hosts:
    - www.j-frost.dk
    - j-frost.dk
    secretName: www-tls
  rules:
  - host: www.j-frost.dk
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: littlelink-svc
            port:
              number: 80
  - host: j-frost.dk
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: littlelink-svc
            port:
              number: 80
