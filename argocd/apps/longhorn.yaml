apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: longhorn
  namespace: argocd
spec:
  project: homelab
  source:
    repoURL: https://github.com/Frostar/k3s
    targetRevision: HEAD
    path: helm-values/longhorn-system
  destination:
    server: https://kubernetes.default.svc
    namespace: longhorn-system
  syncPolicy: {}
