apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: traefik
  namespace: argocd
spec:
  project: homelab
  source:
    repoURL: https://github.com/Frostar/k3s
    targetRevision: HEAD
    path: core/traefik
  destination:
    server: https://kubernetes.default.svc
    namespace: kube-system
  syncPolicy: {}
