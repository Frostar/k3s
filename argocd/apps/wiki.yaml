apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: wikijs
  namespace: argocd
spec:
  project: homelab
  source:
    repoURL: https://github.com/Frostar/k3s
    targetRevision: HEAD
    path: apps/wikijs
  destination:
    server: https://kubernetes.default.svc
    namespace: wikijs
  syncPolicy: {}
