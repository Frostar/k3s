apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: littlelink
  namespace: argocd
spec:
  project: homelab
  source:
    repoURL: https://github.com/Frostar/k3s
    targetRevision: HEAD
    path: apps/littlelink
  destination:
    server: https://kubernetes.default.svc
    namespace: public-sites
  syncPolicy: {}
