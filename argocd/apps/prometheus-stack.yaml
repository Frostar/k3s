apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: prometheus-stack
  namespace: argocd
spec:
  project: homelab
  source:
    repoURL: https://github.com/Frostar/k3s
    targetRevision: HEAD
    path: helm-values/monitoring
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy: {}
