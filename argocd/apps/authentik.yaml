apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: authentik
  namespace: argocd
spec:
  project: homelab
  source:
    repoURL: https://github.com/Frostar/k3s
    targetRevision: HEAD
    path: apps/authentik
  destination:
    server: https://kubernetes.default.svc
    namespace: authentik
  syncPolicy: {}
