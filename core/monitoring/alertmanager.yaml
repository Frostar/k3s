# Source: kube-prometheus-stack/templates/alertmanager/service.yaml
apiVersion: v1
kind: Service
metadata:
  name: prometheus-stack-kube-prom-alertmanager
  namespace: monitoring
  labels:
    app: kube-prometheus-stack-alertmanager
    self-monitor: "true"

    app.kubernetes.io/instance: prometheus-stack
    app.kubernetes.io/version: "80.4.2"
    app.kubernetes.io/part-of: kube-prometheus-stack
    release: "prometheus-stack"
spec:
  ports:
  - name: http-web
    port: 9093
    targetPort: 9093
    protocol: TCP
  - name: reloader-web
    appProtocol: http
    port: 8080
    targetPort: reloader-web
  selector:
    app.kubernetes.io/name: alertmanager
    alertmanager: prometheus-stack-kube-prom-alertmanager
  sessionAffinity: None
  type: "ClusterIP"
---
# Source: kube-prometheus-stack/templates/alertmanager/alertmanager.yaml
apiVersion: monitoring.coreos.com/v1
kind: Alertmanager
metadata:
  name: prometheus-stack-kube-prom-alertmanager
  namespace: monitoring
  labels:
    app: kube-prometheus-stack-alertmanager

    app.kubernetes.io/instance: prometheus-stack
    app.kubernetes.io/version: "80.4.2"
    app.kubernetes.io/part-of: kube-prometheus-stack
    release: "prometheus-stack"
spec:
  image: "quay.io/prometheus/alertmanager:v0.30.0"
  imagePullPolicy: "IfNotPresent"
  version: v0.30.0
  replicas: 1
  listenLocal: false
  serviceAccountName: prometheus-stack-kube-prom-alertmanager
  automountServiceAccountToken: true
  externalUrl: http://prometheus-stack-kube-prom-alertmanager.monitoring:9093
  paused: false
  logFormat: "logfmt"
  logLevel:  "info"
  retention: "120h"
  alertmanagerConfigSelector: {}
  alertmanagerConfigNamespaceSelector:
    {}
  routePrefix: "/"
  securityContext:
    fsGroup: 2000
    runAsGroup: 2000
    runAsNonRoot: true
    runAsUser: 1000
    seccompProfile:
      type: RuntimeDefault
  storage:
    volumeClaimTemplate:
      spec:
        accessModes:
        - ReadWriteOnce
        resources:
          requests:
            storage: 2Gi
        storageClassName: longhorn
  affinity:
    podAntiAffinity:
      preferredDuringSchedulingIgnoredDuringExecution:
      - weight: 100
        podAffinityTerm:
          topologyKey: kubernetes.io/hostname
          labelSelector:
            matchExpressions:
              - {key: app.kubernetes.io/name, operator: In, values: [alertmanager]}
              - {key: alertmanager, operator: In, values: [prometheus-stack-kube-prom-alertmanager]}
  portName: http-web
---
# Source: kube-prometheus-stack/templates/alertmanager/servicemonitor.yaml
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: prometheus-stack-kube-prom-alertmanager
  namespace: monitoring
  labels:
    app: kube-prometheus-stack-alertmanager

    app.kubernetes.io/instance: prometheus-stack
    app.kubernetes.io/version: "80.4.2"
    app.kubernetes.io/part-of: kube-prometheus-stack
    release: "prometheus-stack"
spec:

  selector:
    matchLabels:
      app: kube-prometheus-stack-alertmanager
      release: "prometheus-stack"
      self-monitor: "true"
  namespaceSelector:
    matchNames:
      - "monitoring"
  endpoints:
  - port: http-web
    enableHttp2: true
    path: "/metrics"
  - port: reloader-web
    path: "/metrics"
---
