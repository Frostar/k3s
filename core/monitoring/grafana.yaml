            initialDelaySeconds: 60
            timeoutSeconds: 30
          readinessProbe:
            httpGet:
              path: /api/health
              port: 3000
          resources:
            limits:
              cpu: 1000m
              memory: 1Gi
            requests:
              cpu: 100m
              memory: 256Mi
      volumes:
        - name: config
          configMap:
            name: prometheus-stack-grafana
        - name: storage
          persistentVolumeClaim:
            claimName: prometheus-stack-grafana
        - name: sc-dashboard-volume
