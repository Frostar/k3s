# Optional: Expose Traefik dashboard via Ingress
# Uncomment the middleware annotation to protect with Authentik (after Authentik is working)

apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: traefik-dashboard
  namespace: kube-system
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: websecure
    traefik.ingress.kubernetes.io/router.service: api@internal
    traefik.ingress.kubernetes.io/router.middlewares: default-security-headers@kubernetescrd
    cert-manager.io/cluster-issuer: letsencrypt-cloudflare  # Using DNS-01 challenge
    # Uncomment to protect with Authentik (chain with security headers):
    # traefik.ingress.kubernetes.io/router.middlewares: default-security-headers@kubernetescrd,authentik-authentik@kubernetescrd
spec:
  ingressClassName: traefik
  tls:
  - hosts:
    - traefik.j-frost.dk  # CHANGE THIS to your domain
    secretName: traefik-dashboard-tls
  rules:
  - host: traefik.j-frost.dk  # CHANGE THIS to your domain
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: traefik
            port:
              number: 9000  # Traefik dashboard port
