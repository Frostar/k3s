apiVersion: v1
items:
  - apiVersion: v1
    kind: Service
    metadata:
      annotations: {}
      labels:
        app.kubernetes.io/component: applicationset-controller
        app.kubernetes.io/name: argocd-applicationset-controller
        app.kubernetes.io/part-of: argocd
      name: argocd-applicationset-controller
      namespace: argocd
    spec:
      internalTrafficPolicy: Cluster
      ipFamilies:
        - IPv4
      ipFamilyPolicy: SingleStack
      ports:
        - name: webhook
          port: 7000
          protocol: TCP
          targetPort: webhook
        - name: metrics
          port: 8080
          protocol: TCP
          targetPort: metrics
      selector:
        app.kubernetes.io/name: argocd-applicationset-controller
      sessionAffinity: None
      type: ClusterIP
    status:
      loadBalancer: {}
  - apiVersion: v1
    kind: Service
    metadata:
      annotations: {}
      labels:
        app.kubernetes.io/component: dex-server
        app.kubernetes.io/name: argocd-dex-server
        app.kubernetes.io/part-of: argocd
      name: argocd-dex-server
      namespace: argocd
    spec:
      internalTrafficPolicy: Cluster
      ipFamilies:
        - IPv4
      ipFamilyPolicy: SingleStack
      ports:
        - appProtocol: TCP
          name: http
          port: 5556
          protocol: TCP
          targetPort: 5556
        - name: grpc
          port: 5557
          protocol: TCP
          targetPort: 5557
        - name: metrics
          port: 5558
          protocol: TCP
          targetPort: 5558
      selector:
        app.kubernetes.io/name: argocd-dex-server
      sessionAffinity: None
      type: ClusterIP
    status:
      loadBalancer: {}
  - apiVersion: v1
    kind: Service
    metadata:
      annotations: {}
      labels:
        app.kubernetes.io/component: metrics
        app.kubernetes.io/name: argocd-metrics
        app.kubernetes.io/part-of: argocd
      name: argocd-metrics
      namespace: argocd
    spec:
      internalTrafficPolicy: Cluster
      ipFamilies:
        - IPv4
      ipFamilyPolicy: SingleStack
      ports:
        - name: metrics
          port: 8082
          protocol: TCP
          targetPort: 8082
      selector:
        app.kubernetes.io/name: argocd-application-controller
      sessionAffinity: None
      type: ClusterIP
    status:
      loadBalancer: {}
  - apiVersion: v1
    kind: Service
    metadata:
      annotations: {}
      labels:
        app.kubernetes.io/component: notifications-controller
        app.kubernetes.io/name: argocd-notifications-controller-metrics
        app.kubernetes.io/part-of: argocd
      name: argocd-notifications-controller-metrics
      namespace: argocd
    spec:
      internalTrafficPolicy: Cluster
      ipFamilies:
        - IPv4
      ipFamilyPolicy: SingleStack
      ports:
        - name: metrics
          port: 9001
          protocol: TCP
          targetPort: 9001
      selector:
        app.kubernetes.io/name: argocd-notifications-controller
      sessionAffinity: None
      type: ClusterIP
    status:
      loadBalancer: {}
  - apiVersion: v1
    kind: Service
    metadata:
      annotations: {}
      labels:
        app.kubernetes.io/component: redis
        app.kubernetes.io/name: argocd-redis
        app.kubernetes.io/part-of: argocd
      name: argocd-redis
      namespace: argocd
    spec:
      internalTrafficPolicy: Cluster
      ipFamilies:
        - IPv4
      ipFamilyPolicy: SingleStack
      ports:
        - name: tcp-redis
          port: 6379
          protocol: TCP
          targetPort: 6379
      selector:
        app.kubernetes.io/name: argocd-redis
      sessionAffinity: None
      type: ClusterIP
    status:
      loadBalancer: {}
  - apiVersion: v1
    kind: Service
    metadata:
      annotations: {}
      labels:
        app.kubernetes.io/component: repo-server
        app.kubernetes.io/name: argocd-repo-server
        app.kubernetes.io/part-of: argocd
      name: argocd-repo-server
      namespace: argocd
    spec:
      internalTrafficPolicy: Cluster
      ipFamilies:
        - IPv4
      ipFamilyPolicy: SingleStack
      ports:
        - name: server
          port: 8081
          protocol: TCP
          targetPort: 8081
        - name: metrics
          port: 8084
          protocol: TCP
          targetPort: 8084
      selector:
        app.kubernetes.io/name: argocd-repo-server
      sessionAffinity: None
      type: ClusterIP
    status:
      loadBalancer: {}
  - apiVersion: v1
    kind: Service
    metadata:
      annotations:
        metallb.io/ip-allocated-from-pool: default-pool
        svccontroller.k3s.cattle.io/disablelb: "true"
      finalizers:
        - service.kubernetes.io/load-balancer-cleanup
      labels:
        app.kubernetes.io/component: server
        app.kubernetes.io/name: argocd-server
        app.kubernetes.io/part-of: argocd
      name: argocd-server
      namespace: argocd
    spec:
      allocateLoadBalancerNodePorts: true
      externalTrafficPolicy: Cluster
      internalTrafficPolicy: Cluster
      ipFamilies:
        - IPv4
      ipFamilyPolicy: SingleStack
      loadBalancerIP: 192.168.10.130
      ports:
        - name: http
          nodePort: 31486
          port: 80
          protocol: TCP
          targetPort: 8080
        - name: https
          nodePort: 32258
          port: 443
          protocol: TCP
          targetPort: 8080
      selector:
        app.kubernetes.io/name: argocd-server
      sessionAffinity: None
      type: LoadBalancer
    status:
      loadBalancer:
        ingress:
          - ip: 192.168.10.130
            ipMode: VIP
  - apiVersion: v1
    kind: Service
    metadata:
      annotations: {}
      labels:
        app.kubernetes.io/component: server
        app.kubernetes.io/name: argocd-server-metrics
        app.kubernetes.io/part-of: argocd
      name: argocd-server-metrics
      namespace: argocd
    spec:
      internalTrafficPolicy: Cluster
      ipFamilies:
        - IPv4
      ipFamilyPolicy: SingleStack
      ports:
        - name: metrics
          port: 8083
          protocol: TCP
          targetPort: 8083
      selector:
        app.kubernetes.io/name: argocd-server
      sessionAffinity: None
      type: ClusterIP
    status:
      loadBalancer: {}
kind: List
