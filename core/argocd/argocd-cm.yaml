---
apiVersion: v1
kind: ConfigMap
metadata:
  name: argocd-cm
  namespace: argocd
  labels:
    app.kubernetes.io/name: argocd-cm
    app.kubernetes.io/part-of: argocd
data:
  url: https://argocd.j-frost.dk
  oidc.config: |
    name: Authentik
    issuer: https://auth.j-frost.dk/application/o/argocd/
    clientID: ah7KCq146vBig2IWkSg2syZou1fFegPuVaAa1QZq
    clientSecret: $oidc.authentik.clientSecret
    requestedScopes:
      - openid
      - profile
      - email
